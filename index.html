<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Counc3 Escrow</title>
<script src="https://js.paystack.co/v1/inline.js"></script>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', sans-serif;
}

body {
  background: linear-gradient(135deg, #0f172a, #020617);
  color: #e2e8f0;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 10px;
}

.container {
  width: 100%;
  max-width: 420px;
  padding: 20px;
  border-radius: 20px;
  background: rgba(30, 41, 59, 0.7);
  backdrop-filter: blur(12px);
  box-shadow: 0 0 40px rgba(0, 255, 200, 0.1);
}

h1 {
  text-align: center;
  font-size: 22px;
  margin-bottom: 5px;
}

.subtitle {
  text-align: center;
  font-size: 14px;
  color: #94a3b8;
  margin-bottom: 20px;
}

.input-group {
  margin-bottom: 14px;
}

input {
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  border: none;
  outline: none;
  background: #020617;
  color: #e2e8f0;
  font-size: 16px;
}

.summary {
  margin-top: 15px;
  padding: 14px;
  border-radius: 12px;
  background: rgba(0, 255, 200, 0.08);
  font-size: 14px;
}

button {
  margin-top: 15px;
  width: 100%;
  padding: 16px;
  border-radius: 14px;
  border: none;
  font-size: 16px;
  font-weight: bold;
  background: linear-gradient(90deg, #22c55e, #00ffc8);
  color: #020617;
  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  transform: scale(1.02);
}

.footer {
  text-align: center;
  margin-top: 15px;
  font-size: 12px;
  color: #64748b;
}

/* ===== MOBILE SPECIFIC ===== */
@media (max-width: 480px) {
  body {
    padding: 5px;
  }

  h1 {
    font-size: 20px;
  }

  input {
    font-size: 15px;
    padding: 12px;
  }

  button {
    font-size: 15px;
    padding: 14px;
  }

  .summary {
    font-size: 13px;
    padding: 12px;
  }
}
</style>
</head>

<body>

<div class="container">
  <h1>Counc3 Escrow</h1>
  <p class="subtitle">Secure Middleman Transactions</p>

  <div class="input-group"><input type="text" id="buyer" placeholder="Buyer Name"></div>
  <div class="input-group"><input type="text" id="seller" placeholder="Seller Name"></div>
  <div class="input-group"><input type="number" id="amount" placeholder="Amount (₦)"></div>
  <div class="input-group"><input type="email" id="email" placeholder="Buyer Email"></div>

  <!-- Deal Summary -->
  <div class="summary" id="summary">No deal preview yet</div>

  <button onclick="notifyAndPay()">Secure Payment</button>

  <div class="footer">Funds are held securely until release</div>
</div>

<script>
const inputs = document.querySelectorAll("input");
inputs.forEach(input => input.addEventListener("input", updateSummary));

function updateSummary(){
  let buyer = document.getElementById("buyer").value || "-";
  let seller = document.getElementById("seller").value || "-";
  let amount = document.getElementById("amount").value || "0";
  document.getElementById("summary").innerHTML = `<b>Deal Summary</b><br>Buyer: ${buyer}<br>Seller: ${seller}<br>Amount: ₦${amount}`;
}

// ===== IFTTT WEBHOOK SETUP =====
const IFTTT_WEBHOOK_URL = "https://maker.ifttt.com/trigger/escrow_click/with/key/YOUR_IFTTT_KEY";

// ===== PAYSTACK PUBLIC KEY =====
const PAYSTACK_PUBLIC_KEY = "YOUR_PAYSTACK_PUBLIC_KEY";

function notifyAndPay(){
  // 1️⃣ Send Gmail notification via IFTTT
  fetch(IFTTT_WEBHOOK_URL, { method:"POST" })
    .then(()=>console.log("Gmail notification sent"))
    .catch(()=>console.log("Error sending notification"));

  // 2️⃣ Launch Paystack payment
  let amount = document.getElementById("amount").value * 100;
  let email = document.getElementById("email").value;
  if(!email || amount <= 0){alert("Fill all fields correctly"); return;}

  let handler = PaystackPop.setup({
    key: PAYSTACK_PUBLIC_KEY,
    email: email,
    amount: amount,
    currency: "NGN",
    metadata:{
      custom_fields:[
        { display_name:"Buyer", value: document.getElementById("buyer").value },
        { display_name:"Seller", value: document.getElementById("seller").value }
      ]
    },
    callback: function(response){ alert("Payment successful! Ref: "+response.reference); },
    onClose: function(){ alert("Transaction cancelled"); }
  });

  handler.openIframe();
}
</script>

</body>
</html>
