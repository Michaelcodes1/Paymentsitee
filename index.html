<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Payment Dashboard</title>
<script src="https://js.paystack.co/v1/inline.js"></script>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', sans-serif;
}
html, body {
  height: 100%;
  width: 100%;
}
body {
  background: linear-gradient(135deg,#0f172a,#020617);
  color: #e2e8f0;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}
.container {
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
  justify-content: space-around; /* spread inputs, summary, button */
  padding: 20px;
}
h1 {
  font-size: 48px; /* HUGE heading */
  text-align: center;
}
.subtitle {
  font-size: 24px;
  text-align: center;
  color: #94a3b8;
}
.input-group {
  margin-bottom: 20px;
}
input {
  width: 100%;
  padding: 28px;
  font-size: 28px; /* BIG input text */
  border-radius: 20px;
  border: none;
  outline: none;
  background: #020617;
  color: #e2e8f0;
}
.summary {
  padding: 24px;
  border-radius: 20px;
  background: rgba(0,255,200,0.15);
  font-size: 28px; /* BIG summary */
  text-align: center;
  font-weight: bold;
}
button {
  width: 100%;
  padding: 32px;
  font-size: 32px;
  font-weight: bold;
  border: none;
  border-radius: 24px;
  background: linear-gradient(90deg,#22c55e,#00ffc8);
  color: #020617;
  cursor: pointer;
  transition: 0.2s;
}
button:hover {
  transform: scale(1.02);
}
.footer {
  font-size: 18px;
  text-align: center;
  color: #64748b;
  margin-top: 10px;
}
/* Small phone adjustments */
@media (max-width: 360px){
  h1 { font-size: 40px; }
  .subtitle { font-size: 20px; }
  input { padding: 24px; font-size: 24px; }
  .summary { font-size: 24px; padding: 20px; }
  button { padding: 28px; font-size: 28px; }
  .footer { font-size: 16px; }
}
</style>
</head>
<body>

<div class="container">
  <h1>Payment Dashboard</h1>
  <p class="subtitle">Secure Transactions</p>

  <div class="input-group"><input type="text" id="buyer" placeholder="Buyer Name"></div>
  <div class="input-group"><input type="text" id="seller" placeholder="Seller Name"></div>
  <div class="input-group"><input type="number" id="amount" placeholder="Amount (₦)"></div>
  <div class="input-group"><input type="email" id="email" placeholder="Buyer Email"></div>

  <div class="summary" id="summary">No deal preview yet</div>

  <button id="payButton">Secure Payment</button>

  <div class="footer">Funds are held securely until release</div>
</div>

<script>
const inputs = document.querySelectorAll("input");
inputs.forEach(input => input.addEventListener("input", updateSummary));

function updateSummary() {
  const buyer = document.getElementById("buyer").value || "-";
  const seller = document.getElementById("seller").value || "-";
  const amount = document.getElementById("amount").value || "0";
  document.getElementById("summary").innerHTML =
    `<b>Deal Summary</b><br>Buyer: ${buyer}<br>Seller: ${seller}<br>Amount: ₦${amount}`;
}

const PAYSTACK_PUBLIC_KEY = "YOUR_PAYSTACK_PUBLIC_KEY";
let paystackOpen = false;

document.getElementById("payButton").addEventListener("click", function(){
  if(paystackOpen) return;
  const amount = document.getElementById("amount").value * 100;
  const email = document.getElementById("email").value;

  if(!email || amount <= 0){
    alert("Fill all fields correctly");
    return;
  }

  paystackOpen = true;

  const handler = PaystackPop.setup({
    key: PAYSTACK_PUBLIC_KEY,
    email: email,
    amount: amount,
    currency: "NGN",
    metadata: {
      custom_fields: [
        { display_name: "Buyer", value: document.getElementById("buyer").value },
        { display_name: "Seller", value: document.getElementById("seller").value }
      ]
    },
    callback: function(response){
      alert("Payment successful! Ref: " + response.reference);
      paystackOpen = false;
    },
    onClose: function(){
      alert("Transaction cancelled");
      paystackOpen = false;
    }
  });

  handler.openIframe();
});
</script>

</body>
</html>
