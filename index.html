<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Counc3 Escrow Fullscreen</title>
<script src="https://js.paystack.co/v1/inline.js"></script>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', sans-serif;
}

html, body {
  height: 100%;
}

body {
  background: linear-gradient(135deg, #0f172a, #020617);
  color: #e2e8f0;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

.container {
  width: 100%;
  height: 100%;
  padding: 20px;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

h1 {
  text-align: center;
  font-size: 28px;
  margin-bottom: 10px;
}

.subtitle {
  text-align: center;
  font-size: 16px;
  color: #94a3b8;
  margin-bottom: 20px;
}

.input-group {
  margin-bottom: 16px;
}

input {
  width: 100%;
  padding: 18px;
  border-radius: 12px;
  border: none;
  outline: none;
  background: #020617;
  color: #e2e8f0;
  font-size: 18px;
}

.summary {
  margin-top: 20px;
  padding: 16px;
  border-radius: 12px;
  background: rgba(0,255,200,0.1);
  font-size: 16px;
  font-weight: bold;
  text-align: center;
}

button {
  margin-top: 20px;
  width: 100%;
  padding: 20px;
  font-size: 18px;
  font-weight: bold;
  border: none;
  border-radius: 16px;
  background: linear-gradient(90deg, #22c55e, #00ffc8);
  color: #020617;
  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  transform: scale(1.02);
}

.footer {
  text-align: center;
  margin-top: 20px;
  font-size: 14px;
  color: #64748b;
}

/* Small screens tweak */
@media (max-width: 360px){
  input { padding: 16px; font-size: 16px; }
  button { padding: 18px; font-size: 16px; }
  h1 { font-size: 24px; }
  .subtitle { font-size: 14px; }
  .summary { font-size: 14px; padding: 14px; }
}
</style>
</head>
<body>

<div class="container">
  <h1>Counc3 Escrow</h1>
  <p class="subtitle">Secure Middleman Transactions</p>

  <div class="input-group"><input type="text" id="buyer" placeholder="Buyer Name"></div>
  <div class="input-group"><input type="text" id="seller" placeholder="Seller Name"></div>
  <div class="input-group"><input type="number" id="amount" placeholder="Amount (₦)"></div>
  <div class="input-group"><input type="email" id="email" placeholder="Buyer Email"></div>

  <div class="summary" id="summary">No deal preview yet</div>

  <button id="payButton">Secure Payment</button>

  <div class="footer">Funds are held securely until release</div>
</div>

<script>
const inputs = document.querySelectorAll("input");
inputs.forEach(input => input.addEventListener("input", updateSummary));

function updateSummary() {
  const buyer = document.getElementById("buyer").value || "-";
  const seller = document.getElementById("seller").value || "-";
  const amount = document.getElementById("amount").value || "0";
  document.getElementById("summary").innerHTML =
    `<b>Deal Summary</b><br>Buyer: ${buyer}<br>Seller: ${seller}<br>Amount: ₦${amount}`;
}

const PAYSTACK_PUBLIC_KEY = "YOUR_PAYSTACK_PUBLIC_KEY";
let paystackOpen = false;

document.getElementById("payButton").addEventListener("click", function(){
  if(paystackOpen) return;
  const amount = document.getElementById("amount").value * 100;
  const email = document.getElementById("email").value;

  if(!email || amount <= 0){
    alert("Fill all fields correctly");
    return;
  }

  paystackOpen = true;

  const handler = PaystackPop.setup({
    key: PAYSTACK_PUBLIC_KEY,
    email: email,
    amount: amount,
    currency: "NGN",
    metadata: {
      custom_fields: [
        { display_name: "Buyer", value: document.getElementById("buyer").value },
        { display_name: "Seller", value: document.getElementById("seller").value }
      ]
    },
    callback: function(response){
      alert("Payment successful! Ref: " + response.reference);
      paystackOpen = false;
    },
    onClose: function(){
      alert("Transaction cancelled");
      paystackOpen = false;
    }
  });

  handler.openIframe();
});
</script>

</body>
</html>
